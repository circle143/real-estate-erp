name: CD Pipeline

on:
  workflow_run:
    workflows: [ "CI Pipeline" ]
    types:
      - completed

jobs:

  build:

    runs-on: self-hosted

    steps:
      - name: pull docker image
        run: sudo docker pull circle08/real-estate-erp:latest
      - name: Delete Old docker container
        run: sudo docker rm -f real-estate-erp-container || true
      - name: Run Docker Container
        run: sudo docker run -d -p 8080:8080 --name real-estate-erp-container circle08/real-estate-erp